name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: artificialislab/rivus-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            RIVUS_API_VERSION=${{ github.ref_type == 'tag' && github.ref_name || github.sha }}

  deploy:
    name: Deploy rivus-api container
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-client-rivus-api-production
      cancel-in-progress: true

    steps:
      - name: Deploy on vps-prod
        uses: appleboy/ssh-action@v1
        with:
          host: '195.200.4.22'
          username: 'root'
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          envs: GITHUB_SHA
          script: |
            set -euo pipefail

            SHORT_SHA="$(printf '%.7s' "$GITHUB_SHA")"
            IMAGE="ghcr.io/artificialislab/rivus-api:sha-$SHORT_SHA"
            STACK="/opt/clients/rivus"
            SERVICE="rivus-api"
            CONTAINER="rivus-rivus-api"

            [ -f "$STACK/docker-compose.yml" ] || { echo "::error::$STACK/docker-compose.yml not found"; exit 1; }

            cd "$STACK"
            sed -i "s|image: ghcr.io/artificialislab/rivus-api:[^[:space:]]*|image: $IMAGE|" docker-compose.yml
            if grep -q 'RIVUS_API_VERSION=' docker-compose.yml; then
              sed -i "s|- RIVUS_API_VERSION=.*|- RIVUS_API_VERSION=$SHORT_SHA|" docker-compose.yml
            fi
            docker compose pull "$SERVICE"
            docker compose up -d "$SERVICE"

            for attempt in $(seq 1 12); do
              if docker exec "$CONTAINER" node -e "fetch('http://127.0.0.1:3001/ready').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"; then
                docker inspect --format '{{.Name}} {{.State.Health.Status}}' "$CONTAINER"
                docker exec rivus-nginx nginx -s reload || docker restart rivus-nginx
                exit 0
              fi

              if [ "$attempt" -eq 12 ]; then
                docker logs --tail 80 "$CONTAINER" || true
                exit 1
              fi

              sleep 5
            done
